@if (isLoading()) {
  <div class="status-loading"><mat-spinner></mat-spinner></div>
} @else {
  <div class="page-container">
    <app-create-button
      [receivedLabel]="sendingLabel()"
      (createPressed)="onCreatePressed()"
    />
    <app-task-list-card [receivedTaskLists]="sendingTaskLists()" />
  </div>
}
